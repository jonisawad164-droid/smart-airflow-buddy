<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="LCC Ventilation">
<meta name="theme-color" content="#1e4a7a">
<title>LCC-beräkning – Ventilationsaggregat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f4f8;color:#1a1a1a;padding-bottom:80px}
.topbar{background:#1e4a7a;color:#fff;padding:14px 16px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:700;margin-bottom:1px}
.topbar p{font-size:11px;color:#a8c8e0}
.tabs{display:flex;overflow-x:auto;background:#163d66;gap:2px;padding:6px 8px;scrollbar-width:none;position:sticky;top:50px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:7px 14px;font-size:12px;font-weight:600;color:#a8c8e0;border-radius:8px;cursor:pointer;white-space:nowrap;border:none;background:transparent}
.tab.active{background:#fff;color:#1e4a7a}
.page{display:none;padding:12px}
.page.active{display:block}
.card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.card-title{font-size:12px;font-weight:700;color:#1e4a7a;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.5px}
.row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0}
.row:last-child{border-bottom:none}
.row label{font-size:14px;color:#333;flex:1;line-height:1.3}
.row input,.row select{padding:7px 10px;font-size:14px;border:1px solid #ddd;border-radius:8px;background:#f8f9fa;color:#1a1a1a;-webkit-appearance:none}
.row input[type=number],.row input[type=text]{width:110px;text-align:right}
.row select{min-width:140px}
.row input:focus,.row select:focus{outline:2px solid #1e4a7a;background:#fff}
.unit{font-size:12px;color:#888;min-width:32px}
.aggr-wrap{background:#fff;border-radius:14px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow:hidden}
.aggr-hdr{background:#1e4a7a;color:#fff;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.aggr-hdr-title{font-size:14px;font-weight:700}
.aggr-del{background:rgba(255,255,255,0.2);border:none;color:#fff;border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer}
.side-by-side{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #f0f0f0}
.side-col{padding:10px 12px}
.side-col:first-child{border-right:1px solid #f0f0f0}
.side-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding:4px 8px;border-radius:6px;text-align:center}
.side-bef .side-label{background:#fff3cd;color:#7d4e00}
.side-ny .side-label{background:#d4edda;color:#155724}
.side-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #f5f5f5}
.side-row:last-child{border-bottom:none}
.side-row label{font-size:12px;color:#555;flex:1;line-height:1.3}
.side-row input{width:80px;padding:6px 8px;font-size:13px;text-align:right;border:1px solid #ddd;border-radius:7px;background:#f8f9fa;-webkit-appearance:none}
.side-row input:focus{outline:2px solid #1e4a7a;background:#fff}
.side-row .unit{font-size:11px;color:#888;min-width:28px}
.drift-grid{padding:10px 12px}
.drift-grid-title{font-size:12px;font-weight:700;color:#1e4a7a;margin-bottom:8px}
.drift-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:10px}
.drift-day{text-align:center}
.drift-day label{font-size:10px;color:#888;display:block;margin-bottom:3px;font-weight:600}
.drift-day input{width:100%;padding:5px 2px;font-size:13px;text-align:center;border:1px solid #ddd;border-radius:7px;background:#f8f9fa;-webkit-appearance:none}
.drift-day input:focus{outline:2px solid #1e4a7a;background:#fff}
.drift-sum{font-size:13px;color:#1e4a7a;font-weight:700;margin-bottom:10px}
.add-aggr-btn{width:100%;padding:12px;background:#fff;border:2px dashed #1e4a7a;border-radius:14px;color:#1e4a7a;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:12px}
.res-compare{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.res-col{background:#fff;border-radius:12px;padding:12px;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
.res-col-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;text-align:center;padding:4px;border-radius:6px}
.res-col-bef .res-col-title{background:#fff3cd;color:#7d4e00}
.res-col-ny .res-col-title{background:#d4edda;color:#155724}
.res-item{padding:6px 0;border-bottom:1px solid #f0f0f0;text-align:center}
.res-item:last-child{border-bottom:none}
.res-val{font-size:18px;font-weight:700;color:#1e4a7a}
.res-lbl{font-size:11px;color:#888;margin-top:1px}
.payoff-card{background:#1e4a7a;color:#fff;border-radius:14px;padding:16px;text-align:center;margin-bottom:12px}
.payoff-val{font-size:36px;font-weight:700;margin:6px 0}
.payoff-lbl{font-size:13px;color:#a8c8e0}
.payoff-ok{color:#4fc3a1}
.payoff-bad{color:#ff6b6b}
.res-table{width:100%;border-collapse:collapse;font-size:13px}
.res-table th{background:#e8f0f8;padding:8px;text-align:left;font-weight:700;color:#1e4a7a;border:1px solid #ddd}
.res-table td{padding:7px 8px;border:1px solid #ddd;vertical-align:top}
.res-table td.num{text-align:right;font-weight:600}
.res-table tr.subtot td{background:#f8f9fa;font-weight:700}
.res-table tr.tot td{background:#1e4a7a;color:#fff;font-weight:700}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e0e0e0;padding:8px 16px;display:flex;gap:6px;z-index:98}
.stat{text-align:center;flex:1}
.stat-n{font-size:15px;font-weight:700;color:#1e4a7a}
.stat-l{font-size:10px;color:#888}
.note{font-size:12px;color:#888;font-style:italic;padding:4px 0 8px;line-height:1.5}
.warn{background:#fff3cd;border-left:3px solid #e0a000;padding:8px 10px;border-radius:0 8px 8px 0;font-size:13px;color:#7d4e00;margin-bottom:10px}
</style>
</head>
<body>


<div class="tabs">
  <button class="tab active" onclick="showPage('indata',this)">Indata</button>
  <button class="tab" onclick="showPage('aggregat',this)">Aggregat</button>
  <button class="tab" onclick="showPage('resultat',this)">Resultat</button>
</div>

<!-- INDATA -->
<div id="page-indata" class="page active">
  <div class="card">
    <div class="card-title">Projektinformation</div>
    <div class="row"><label>Projekt</label><input type="text" id="i_proj" placeholder="Projektnamn" oninput="calc()"></div>
    <div class="row"><label>Handläggare</label><input type="text" id="i_hand" placeholder="Namn" oninput="calc()"></div>
    <div class="row"><label>Referensnummer</label><input type="text" id="i_ref" placeholder="–" oninput="calc()"></div>
    <div class="row"><label>Datum</label><input type="date" id="i_datum" oninput="calc()"></div>
  </div>

  <div class="card">
    <div class="card-title">Ort (klimatdata)</div>
    <div class="row"><label>Välj ort</label>
      <select id="i_ort" onchange="calc()" style="min-width:180px">
        <option value="">Välj ort...</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Benämningar</div>
    <div class="row"><label>Befintlig anläggning</label><input type="text" id="i_ben_bef" value="Befintligt" oninput="calc()"></div>
    <div class="row"><label>Ny anläggning</label><input type="text" id="i_ben_ny" value="Nytt" oninput="calc()"></div>
  </div>

  <div class="card">
    <div class="card-title">Prisbild</div>
    <div class="row"><label>Elpris</label><input type="number" id="i_elpris" value="1.5" step="0.1" oninput="calc()"><span class="unit">kr/kWh</span></div>
    <div class="row"><label>Värmepris</label><input type="number" id="i_vpris" value="1.0" step="0.1" oninput="calc()"><span class="unit">kr/kWh</span></div>
    <div class="row"><label>Real elprisökning</label><input type="number" id="i_el_okn" value="2" step="0.5" oninput="calc()"><span class="unit">%/år</span></div>
    <div class="row"><label>Real värmeprisökning</label><input type="number" id="i_vp_okn" value="5" step="0.5" oninput="calc()"><span class="unit">%/år</span></div>
    <div class="row"><label>Real kalkylränta</label><input type="number" id="i_kalkyl" value="5.5" step="0.5" oninput="calc()"><span class="unit">%</span></div>
    <div class="row"><label>Brukstid</label><input type="number" id="i_bruk" value="1" step="1" min="1" max="30" oninput="calc()"><span class="unit">år</span></div>
  </div>

  <div class="card">
    <div class="card-title">Åtgärdskostnad</div>
    <div class="row"><label>Kostnad befintligt</label><input type="number" id="i_atg_bef" value="70000" step="1000" oninput="calc()"><span class="unit">kr</span></div>
    <div class="row"><label>Kostnad nytt aggregat</label><input type="number" id="i_atg_ny" value="410000" step="1000" oninput="calc()"><span class="unit">kr</span></div>
  </div>
</div>

<!-- AGGREGAT -->
<div id="page-aggregat" class="page">
  <div class="note" style="padding:0 0 8px">Fyll i befintligt och nytt aggregat sida vid sida. Drifttid anges per veckodag.</div>
  <div id="aggr-list"></div>
  <button class="add-aggr-btn" onclick="addAggregat()">+ Lägg till aggregat</button>
</div>

<!-- RESULTAT -->
<div id="page-resultat" class="page">
  <div id="res-content"><div class="card" style="text-align:center;color:#888;padding:24px">Fyll i indata och aggregat för att se resultat.</div></div>
</div>

<div class="bottom-bar">
  <div class="stat"><div class="stat-n" id="sb_el_bef">–</div><div class="stat-l">El bef kWh/år</div></div>
  <div class="stat"><div class="stat-n" id="sb_el_ny">–</div><div class="stat-l">El nytt kWh/år</div></div>
  <div class="stat"><div class="stat-n" id="sb_payoff">–</div><div class="stat-l">Pay-off år</div></div>
</div>

<script>
const KLIMAT = {

  "Mora":             [-7.2,-7.0,-3.0, 3.5, 9.8,14.5,16.9,15.5,10.2, 4.3,-1.5,-5.5],

  "Sveg":             [-9.8,-9.5,-5.5, 1.5, 8.0,13.0,15.8,14.3, 9.0, 3.2,-3.8,-7.8],
  "Söderhamn":        [-4.5,-4.4,-0.8, 5.2,11.2,15.6,18.0,16.7,11.5, 5.8, 0.4,-3.2],
  "Timrå":            [-4.8,-4.7,-1.1, 4.7,10.9,15.3,17.7,16.4,11.1, 5.4, 0.1,-3.5],
  "Umeå":             [-6.5,-6.4,-2.5, 3.5, 9.8,14.5,17.0,15.6,10.3, 4.5,-1.2,-4.8],
  "Umeå Flygplats":   [-6.2,-6.2,-2.3, 3.8,10.0,14.8,17.2,15.8,10.5, 4.7,-1.0,-4.6],
  "Vindeln":          [-9.5,-9.2,-5.0, 1.8, 8.5,13.3,16.0,14.5, 9.2, 3.5,-3.5,-7.5],
  "Åre":              [-9.5,-9.2,-5.2, 1.8, 8.3,13.2,16.0,14.5, 9.2, 3.5,-3.5,-7.5],
  "Ånge":             [-8.0,-7.8,-3.8, 2.8, 9.2,14.0,16.5,15.1, 9.8, 4.0,-2.5,-6.2],
  "Östersund":        [-8.2,-7.8,-3.8, 2.8, 9.2,14.0,16.5,15.1, 9.8, 4.0,-2.5,-6.3],
  "Örnsköldsvik":     [-5.0,-5.0,-1.3, 4.4,10.7,15.2,17.5,16.2,11.0, 5.2,-0.1,-3.6],
  "Sälen":            [-8.5,-8.2,-4.5, 2.5, 8.8,13.5,16.0,14.6, 9.3, 3.4,-2.8,-6.8],
  "Särna":            [-9.8,-9.5,-5.5, 1.5, 7.8,12.8,15.5,14.0, 8.8, 3.0,-3.8,-7.8],
};

const ORTER = ["Avesta","Bollnäs","Borlänge","Bräcke","Falun","Gävle","Hedemora","Hofors","Hudiksvall","Härnösand","Kramfors","Krokom","Ljusdal","Ludvika","Lycksele","Malung","Mora","Rättvik","Sandviken","Skellefteå","Sollefteå","Strömsund","Sundsvall","Sveg","Söderhamn","Timrå","Umeå","Umeå Flygplats","Vindeln","Åre","Ånge","Östersund","Örnsköldsvik","Sälen","Särna"];

const DAGAR = [31,28,31,30,31,30,31,31,30,31,30,31];
var aggrCount = 0;
var aggrIds = [];

// Populate ort dropdown
window.addEventListener('DOMContentLoaded', function() {
  var sel = document.getElementById('i_ort');
  ORTER.slice().sort(function(a,b){return a.localeCompare(b,"sv");}).forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if(o === 'Östersund') opt.selected = true;
    sel.appendChild(opt);
  });
  addAggregat();
  calc();
});

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='resultat') renderResultat();
}

function addAggregat() {
  aggrCount++;
  var id = 'a' + aggrCount;
  aggrIds.push(id);
  var div = document.createElement('div');
  div.className = 'aggr-wrap';
  div.id = 'aggr-'+id;
  div.innerHTML = aggrHTML(id, aggrCount);
  document.getElementById('aggr-list').appendChild(div);
  calc();
}

function delAggregat(id) {
  var el = document.getElementById('aggr-'+id);
  if(el) el.remove();
  aggrIds = aggrIds.filter(function(x){return x!==id;});
  calc();
}

function aggrHTML(id, num) {
  return '<div class="aggr-hdr"><span class="aggr-hdr-title">Aggregat ' + num + '</span><button class="aggr-del" onclick="delAggregat(\'' + id + '\')">Ta bort</button></div>' +
  '<div style="padding:10px 12px 0"><div class="row"><label style="font-size:13px">Beteckning</label><input type="text" id="' + id + '_namn" value="LA' + num + '" placeholder="LA01" oninput="calc()" style="width:90px;text-align:left"></div></div>' +
  '<div class="side-by-side">' +
  '<div class="side-col side-bef">' +
  '<div class="side-label">Befintligt</div>' +
  '<div class="side-row"><label>Luftflöde</label><input type="number" id="' + id + '_bef_q" value="0.7" step="0.01" oninput="calc()"><span class="unit">m³/s</span></div>' +
  '<div class="side-row"><label>SFP</label><input type="number" id="' + id + '_bef_sfp" value="5.6" step="0.1" oninput="calc()"><span class="unit">kW/(m³/s)</span></div>' +
  '<div class="side-row"><label>Tillufttemp</label><input type="number" id="' + id + '_bef_tt" value="18" step="0.5" oninput="calc()"><span class="unit">°C</span></div>' +
  '<div class="side-row"><label>Frånlufttemp</label><input type="number" id="' + id + '_bef_ft" value="20" step="0.5" oninput="calc()"><span class="unit">°C</span></div>' +
  '<div class="side-row"><label>VVX-verkn.</label><input type="number" id="' + id + '_bef_vvx" value="0.66" step="0.01" min="0" max="1" oninput="calc()"><span class="unit">0–1</span></div>' +
  '</div>' +
  '<div class="side-col side-ny">' +
  '<div class="side-label">Nytt</div>' +
  '<div class="side-row"><label>Luftflöde</label><input type="number" id="' + id + '_ny_q" value="0.7" step="0.01" oninput="calc()"><span class="unit">m³/s</span></div>' +
  '<div class="side-row"><label>SFP</label><input type="number" id="' + id + '_ny_sfp" value="1.5" step="0.1" oninput="calc()"><span class="unit">kW/(m³/s)</span></div>' +
  '<div class="side-row"><label>Tillufttemp</label><input type="number" id="' + id + '_ny_tt" value="18" step="0.5" oninput="calc()"><span class="unit">°C</span></div>' +
  '<div class="side-row"><label>Frånlufttemp</label><input type="number" id="' + id + '_ny_ft" value="20" step="0.5" oninput="calc()"><span class="unit">°C</span></div>' +
  '<div class="side-row"><label>VVX-verkn.</label><input type="number" id="' + id + '_ny_vvx" value="0.85" step="0.01" min="0" max="1" oninput="calc()"><span class="unit">0–1</span></div>' +
  '</div>' +
  '</div>' +

  '<div class="drift-grid-title">Drifttid per veckodag (timmar)</div>' +
  '<div class="drift-days">' +
  '<div class="drift-day"><label>Mån</label><input type="number" id="' + id + '_d0" value="8" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '<div class="drift-day"><label>Tis</label><input type="number" id="' + id + '_d1" value="8" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '<div class="drift-day"><label>Ons</label><input type="number" id="' + id + '_d2" value="8" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '<div class="drift-day"><label>Tor</label><input type="number" id="' + id + '_d3" value="8" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '<div class="drift-day"><label>Fre</label><input type="number" id="' + id + '_d4" value="8" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '<div class="drift-day"><label>Lör</label><input type="number" id="' + id + '_d5" value="0" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '<div class="drift-day"><label>Sön</label><input type="number" id="' + id + '_d6" value="0" step="0.5" min="0" max="24" oninput="updDrift(\'' + id + '\')"></div>' +
  '</div>' +
  '<div class="row" style="padding:6px 0"><label style="font-size:13px">Driftsveckor per år</label><input type="number" id="' + id + '_veckor" value="52" step="1" min="1" max="52" oninput="updDrift(\'' + id + '\')"><span class="unit">v/år</span></div>' +
  '<div class="drift-sum" id="' + id + '_drift_sum">Total drifttid: 40 h/vecka × 52 v = 2 080 h/år</div>' +
  '</div>';
}

function updDrift(id) {
  var h_vecka = 0;
  for(var i=0;i<7;i++) h_vecka += parseFloat(document.getElementById(id+'_d'+i).value)||0;
  var veckor = parseFloat(document.getElementById(id+'_veckor').value)||52;
  var h_ar = Math.round(h_vecka * veckor);
  document.getElementById(id+'_drift_sum').textContent = 
    'Total drifttid: ' + h_vecka.toFixed(1) + ' h/vecka × ' + veckor + ' v = ' + h_ar.toLocaleString('sv-SE') + ' h/år';
  calc();
}

function getDrift(id) {
  var h_vecka = 0;
  for(var i=0;i<7;i++) h_vecka += parseFloat(document.getElementById(id+'_d'+i).value)||0;
  var veckor = parseFloat(document.getElementById(id+'_veckor').value)||52;
  return h_vecka * veckor; // h/år
}

function n(id) { var el=document.getElementById(id); return el ? (parseFloat(el.value)||0) : 0; }

function calcVarme(q, vvx, T_till, T_fran, h_ar, klimat_temps) {
  var h_dag_medel = h_ar / 365;
  var total = 0;
  var rho=1.2, cp=1005;
  for(var m=0;m<12;m++) {
    var T_ute = klimat_temps[m];
    var T_after = T_ute + vvx * (T_fran - T_ute);
    var delta = T_till - T_after;
    if(delta > 0) {
      total += rho * q * DAGAR[m] * h_dag_medel * cp * delta / 1000;
    }
  }
  return total;
}

function calcSNV(pris, pris_okn_pct, kalkyl_pct, brukstid) {
  var r = kalkyl_pct/100 - pris_okn_pct/100;
  if(brukstid <= 1) return pris / (1 + r);
  // Nuvärdesumma for n år
  var sum = 0;
  var faktor = (1 + pris_okn_pct/100) / (1 + kalkyl_pct/100);
  var f = faktor;
  for(var t=0;t<brukstid;t++) { sum += f; f *= faktor; }
  return pris * sum / brukstid; // per år
}


function calcGradtimmar(vvx, T_till, T_fran, h_ar, temps) {
  var h_dag = h_ar / 365;
  var gt = 0;
  for(var m=0;m<12;m++) {
    var T_after = temps[m] + vvx * (T_fran - temps[m]);
    var delta = T_till - T_after;
    if(delta > 0) gt += delta * DAGAR[m] * h_dag;
  }
  return gt;
}
var lastResult = null;

function calc() {
  var ort = document.getElementById('i_ort').value;
  if(!ort || !KLIMAT[ort]) { document.getElementById('sb_payoff').textContent='–'; return; }
  var temps = KLIMAT[ort];
  var elpris = n('i_elpris'), vpris = n('i_vpris');
  var el_okn = n('i_el_okn'), vp_okn = n('i_vp_okn');
  var kalkyl = n('i_kalkyl'), brukstid = n('i_bruk')||1;
  var snv_el = calcSNV(elpris, el_okn, kalkyl, brukstid);
  var snv_vp = calcSNV(vpris, vp_okn, kalkyl, brukstid);

  var tot_el_bef=0, tot_vp_bef=0, tot_el_ny=0, tot_vp_ny=0, tot_gt_bef=0, tot_gt_ny=0;
  var aggrRes = [];

  aggrIds.forEach(function(id) {
    var el = document.getElementById('aggr-'+id);
    if(!el) return;
    var navn = document.getElementById(id+'_namn').value || id;
    var h_ar = getDrift(id);

    // Befintligt
    var q_bef=n(id+'_bef_q'), sfp_bef=n(id+'_bef_sfp');
    var tt_bef=n(id+'_bef_tt'), ft_bef=n(id+'_bef_ft'), vvx_bef=n(id+'_bef_vvx');
    var gt_bef = calcGradtimmar(vvx_bef, tt_bef, ft_bef, h_ar, temps);
    var el_bef = q_bef * sfp_bef * h_ar;
    var vp_bef = calcVarme(q_bef, vvx_bef, tt_bef, ft_bef, h_ar, temps);

    // Nytt
    var q_ny=n(id+'_ny_q'), sfp_ny=n(id+'_ny_sfp');
    var tt_ny=n(id+'_ny_tt'), ft_ny=n(id+'_ny_ft'), vvx_ny=n(id+'_ny_vvx');
    var gt_ny  = calcGradtimmar(vvx_ny,  tt_ny,  ft_ny,  h_ar, temps);
    var el_ny = q_ny * sfp_ny * h_ar;
    var vp_ny = calcVarme(q_ny, vvx_ny, tt_ny, ft_ny, h_ar, temps);

    tot_el_bef+=el_bef; tot_vp_bef+=vp_bef; tot_gt_bef+=gt_bef;
    tot_el_ny+=el_ny; tot_vp_ny+=vp_ny; tot_gt_ny+=gt_ny;

    aggrRes.push({
      namn:navn, h_ar:h_ar,
      el_bef:el_bef, vp_bef:vp_bef,
      el_ny:el_ny, vp_ny:vp_ny,
      kostn_bef: el_bef*elpris + vp_bef*vpris,
      kostn_ny: el_ny*elpris + vp_ny*vpris,
      lcce_bef: el_bef*snv_el + vp_bef*snv_vp,
      lcce_ny: el_ny*snv_el + vp_ny*snv_vp
    });
  });

  var kostn_bef_tot = tot_el_bef*elpris + tot_vp_bef*vpris;
  var kostn_ny_tot = tot_el_ny*elpris + tot_vp_ny*vpris;
  var lcce_bef_tot = tot_el_bef*snv_el + tot_vp_bef*snv_vp;
  var lcce_ny_tot = tot_el_ny*snv_el + tot_vp_ny*snv_vp;
  var atg_bef = n('i_atg_bef'), atg_ny = n('i_atg_ny');
  var payoff = kostn_bef_tot > kostn_ny_tot ? (atg_ny - atg_bef) / (kostn_bef_tot - kostn_ny_tot) : Infinity;

  lastResult = {
    aggrRes:aggrRes, ort:ort, tot_gt_bef:tot_gt_bef, tot_gt_ny:tot_gt_ny,
    tot_el_bef:tot_el_bef, tot_vp_bef:tot_vp_bef,
    tot_el_ny:tot_el_ny, tot_vp_ny:tot_vp_ny,
    kostn_bef_tot:kostn_bef_tot, kostn_ny_tot:kostn_ny_tot,
    lcce_bef_tot:lcce_bef_tot, lcce_ny_tot:lcce_ny_tot,
    payoff:payoff, atg_bef:atg_bef, atg_ny:atg_ny,
    snv_el:snv_el, snv_vp:snv_vp,
    elpris:elpris, vpris:vpris
  };

  // Bottombar
  document.getElementById('sb_el_bef').textContent = Math.round(tot_el_bef).toLocaleString('sv-SE');
  document.getElementById('sb_el_ny').textContent = Math.round(tot_el_ny).toLocaleString('sv-SE');
  document.getElementById('sb_payoff').textContent = isFinite(payoff) ? payoff.toFixed(1) : '–';
}

function fmt(v) { return Math.round(v).toLocaleString('sv-SE'); }
function fmtDec(v,d) { return v.toFixed(d||1); }
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function renderResultat() {
  if(!lastResult) return;
  var r = lastResult;
  var ben_bef = esc(document.getElementById('i_ben_bef').value || 'Befintligt');
  var ben_ny = esc(document.getElementById('i_ben_ny').value || 'Nytt');
  var ort = esc(r.ort);
  var besparing = r.kostn_bef_tot - r.kostn_ny_tot;
  var payoffOk = isFinite(r.payoff) && r.payoff > 0;

  var html = '';

  // Pay-off
  html += '<div class="payoff-card">';
  html += '<div class="payoff-lbl">Pay-off tid</div>';
  html += '<div class="payoff-val ' + (payoffOk?'payoff-ok':'payoff-bad') + '">' + (payoffOk ? fmtDec(r.payoff,1)+' år' : '–') + '</div>';
  html += '<div class="payoff-lbl">Besparing ' + fmt(besparing) + ' kr/år  |  Ort: ' + ort + '</div>';
  html += '</div>';

  // Jämförelse totalblock
  html += '<div class="res-compare">';
  html += '<div class="res-col res-col-bef">';
  html += '<div class="res-col-title">' + ben_bef + '</div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.tot_el_bef) + '</div><div class="res-lbl">Elenergi kWh/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.tot_vp_bef) + '</div><div class="res-lbl">Värmeenergi kWh/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.tot_gt_bef) + '</div><div class="res-lbl">Gradtimmar h/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.kostn_bef_tot) + '</div><div class="res-lbl">Driftkostnad kr/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.lcce_bef_tot) + '</div><div class="res-lbl">LCCE kr</div></div>';
  html += '</div>';
  html += '<div class="res-col res-col-ny">';
  html += '<div class="res-col-title">' + ben_ny + '</div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.tot_el_ny) + '</div><div class="res-lbl">Elenergi kWh/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.tot_vp_ny) + '</div><div class="res-lbl">Värmeenergi kWh/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.tot_gt_ny) + '</div><div class="res-lbl">Gradtimmar h/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.kostn_ny_tot) + '</div><div class="res-lbl">Driftkostnad kr/år</div></div>';
  html += '<div class="res-item"><div class="res-val">' + fmt(r.lcce_ny_tot) + '</div><div class="res-lbl">LCCE kr</div></div>';
  html += '</div></div>';

  // Per aggregat
  if(r.aggrRes.length > 1) {
    html += '<div class="card"><div class="card-title">Per aggregat</div>';
    html += '<table class="res-table"><tr><th>Aggregat</th><th>Drifttid</th><th>' + ben_bef + ' kr/år</th><th>' + ben_ny + ' kr/år</th><th>Besparing</th></tr>';
    r.aggrRes.forEach(function(a) {
      html += '<tr><td>' + esc(a.namn) + '</td><td class="num">' + fmt(a.h_ar) + ' h</td><td class="num">' + fmt(a.kostn_bef) + '</td><td class="num">' + fmt(a.kostn_ny) + '</td><td class="num">' + fmt(a.kostn_bef-a.kostn_ny) + '</td></tr>';
    });
    html += '</table></div>';
  }

  // Detaljerad tabell
  html += '<div class="card"><div class="card-title">Detaljerad redovisning</div>';
  html += '<table class="res-table">';
  html += '<tr><th>Post</th><th>' + ben_bef + ' kWh/år</th><th>' + ben_bef + ' kr/år</th><th>' + ben_ny + ' kWh/år</th><th>' + ben_ny + ' kr/år</th></tr>';
  html += '<tr><td>Elenergi</td><td class="num">' + fmt(r.tot_el_bef) + '</td><td class="num">' + fmt(r.tot_el_bef*r.elpris) + '</td><td class="num">' + fmt(r.tot_el_ny) + '</td><td class="num">' + fmt(r.tot_el_ny*r.elpris) + '</td></tr>';
  html += '<tr><td>Värmeenergi</td><td class="num">' + fmt(r.tot_vp_bef) + '</td><td class="num">' + fmt(r.tot_vp_bef*r.vpris) + '</td><td class="num">' + fmt(r.tot_vp_ny) + '</td><td class="num">' + fmt(r.tot_vp_ny*r.vpris) + '</td></tr>';
  html += '<tr class="subtot"><td>Driftkostnad/år</td><td class="num">–</td><td class="num">' + fmt(r.kostn_bef_tot) + '</td><td class="num">–</td><td class="num">' + fmt(r.kostn_ny_tot) + '</td></tr>';
  html += '<tr><td>LCCE</td><td class="num">–</td><td class="num">' + fmt(r.lcce_bef_tot) + '</td><td class="num">–</td><td class="num">' + fmt(r.lcce_ny_tot) + '</td></tr>';
  html += '<tr><td>Åtgärdskostnad</td><td colspan="2" class="num">' + fmt(r.atg_bef) + ' kr</td><td colspan="2" class="num">' + fmt(r.atg_ny) + ' kr</td></tr>';
  html += '<tr class="tot"><td>Totalkostnad</td><td colspan="2" class="num">' + fmt(r.lcce_bef_tot+r.atg_bef) + ' kr</td><td colspan="2" class="num">' + fmt(r.lcce_ny_tot+r.atg_ny) + ' kr</td></tr>';
  html += '</table></div>';

  // Besparing
  html += '<div class="card"><div class="card-title">Lönsamhet</div>';
  html += '<div class="row"><label>Besparing driftkostnad/år</label><span style="font-weight:700;color:#28a745">' + fmt(besparing) + ' kr/år</span></div>';
  html += '<div class="row"><label>Åtgärdskostnad ' + ben_bef + '</label><span style="font-weight:700">' + fmt(r.atg_bef) + ' kr</span></div>';
  html += '<div class="row"><label>Åtgärdskostnad ' + ben_ny + '</label><span style="font-weight:700">' + fmt(r.atg_ny) + ' kr</span></div>';
  html += '<div class="row"><label>Pay-off tid</label><span style="font-weight:700;font-size:18px;color:' + (payoffOk&&r.payoff<15?'#28a745':'#e0a000') + '">' + (payoffOk?fmtDec(r.payoff,1)+' år':'–') + '</span></div>';
  html += '</div>';

  document.getElementById('res-content').innerHTML = html;
}
</script>
